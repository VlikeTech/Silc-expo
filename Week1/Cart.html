<!Doctype html>
<html>
    <head>
    <title>Cart</title>
    <link rel="stylesheet" href="cart.css">
    
    </head>
    <body>
        
    <h1>Shopping Cart</h1>
    <div id="cart-items" class="cart-items">
        <button onclick="clearCart()" class="clear-cart" type="button">Clear Cart</button>
        <button onclick="checkout()" class="checkout" type="button">Checkout</button>
        <button onclick="continueShopping()" class="continue-shopping" type="button">Continue Shopping</button>
        <button onclick="removeFromCart()" class="remove-from-cart" type="button">Remove from Cart</button>
        

        
        
        <!-- Cart items will be dynamically added here -->
    </div>
    <script src="cart.js"></script>
    </body>
</html>
