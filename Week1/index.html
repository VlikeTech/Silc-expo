<!DOCTYPE html>
<html>
<head>
    <title>Cricket Shop</title>
    <link rel="stylesheet" href="styles.css"><!--contains all the styles of pages and buttons -->
    <script src="cart.js" defer></script> <!--contains all the functions related to cart operations like add to cart, remove from cart, clear cart, checkout etc. -->
</head>
<body>
    <a href="Cart.html" class="cart-link">🛒 Cart</a> <!-- Link to the shopping cart page -->
    <button onclick="clearCart()" class="clear-cart" type="button">Clear Cart</button> <!-- Button to clear the cart, calls the clearCart function from cart.js -->
    <h1>Welcome to the Cricket Store!</h1>
 
    <div class="products"> <!-- Container for all products -->
<!-- Bats -->
        <div class="cricket"> <!-- Individual product container -->
            <div class="emoji">🏏</div> <!-- Emoji describing the product -->
            <a href="Bats.html" >Bats</a> <!-- Link to the product page -->
        <p>High-quality cricket bats for all levels</p> <!-- Description of the product -->
         <p class="price">$49.99-$149.99</p> <!-- Price range for the product -->
    </div>
<!-- Balls -->
        <div class="cricket">
            <div class="emoji"> 🔴 </div>
            <a href="Balls.html">Balls</a>
            <p>High-quality cricket balls for all levels</p>
            <p class="price">$6.00</p>
        </div>
<!-- Pads -->
        <div class="cricket">
            <div class="emoji">🧤</div>
            <a href="Pads.html">Pads</a>
            <p>Protective gear for players</p>
            <p class="price">$24.99-$49.99</p>
        </div>
<!-- Merchandise -->
        <div class="cricket">
            <div class="emoji">👕</div>
            <a href="Merchandise.html">Merchandise</a>
            <p>Official team jerseys and accessories</p>
            <p class="price">$9.99-$24.99</p>
        </div>
    </div>  
</body>
</html>
